<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <!-- Fondo sutil -->
  <rect width="800" height="320" fill="#FAFAF8"/>

  <!-- Tres círculos solapados: técnico, social, ambiental -->
  <circle cx="320" cy="160" r="110" stroke="#0D7D6F" stroke-width="1.5" opacity="0.6"/>
  <circle cx="420" cy="160" r="110" stroke="#0D7D6F" stroke-width="1.5" opacity="0.6"/>
  <circle cx="370" cy="90" r="110" stroke="#0D7D6F" stroke-width="1.5" opacity="0.35"/>

  <!-- Zona de intersección: relleno sutil -->
  <circle cx="370" cy="145" r="38" fill="#0D7D6F" opacity="0.07"/>

  <!-- Flechas de recursividad (arcos) -->
  <path d="M 220 200 A 160 160 0 0 1 370 35" stroke="#0D7D6F" stroke-width="1.2" opacity="0.4" stroke-dasharray="6 4"/>
  <path d="M 520 200 A 160 160 0 0 0 370 35" stroke="#0D7D6F" stroke-width="1.2" opacity="0.4" stroke-dasharray="6 4"/>
  <path d="M 250 240 A 200 200 0 0 0 490 240" stroke="#0D7D6F" stroke-width="1.2" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Puntas de flecha -->
  <polygon points="367,35 373,45 378,35" fill="#0D7D6F" opacity="0.4"/>
  <polygon points="362,35 367,45 372,35" fill="#0D7D6F" opacity="0.4" transform="translate(6,0)"/>
  <polygon points="490,237 480,242 490,247" fill="#0D7D6F" opacity="0.4"/>

  <!-- Nodos pequeños -->
  <circle cx="320" cy="160" r="3" fill="#0D7D6F" opacity="0.7"/>
  <circle cx="420" cy="160" r="3" fill="#0D7D6F" opacity="0.7"/>
  <circle cx="370" cy="90" r="3" fill="#0D7D6F" opacity="0.7"/>

  <!-- Etiquetas -->
  <text x="265" y="175" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B6960" text-anchor="middle">Técnico</text>
  <text x="475" y="175" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B6960" text-anchor="middle">Social</text>
  <text x="370" y="55" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6B6960" text-anchor="middle">Entorno</text>

  <!-- Líneas decorativas laterales -->
  <line x1="60" y1="80" x2="60" y2="240" stroke="#D9D5CF" stroke-width="0.75"/>
  <line x1="740" y1="80" x2="740" y2="240" stroke="#D9D5CF" stroke-width="0.75"/>
  <circle cx="60" cy="80" r="2" fill="#D9D5CF"/>
  <circle cx="60" cy="240" r="2" fill="#D9D5CF"/>
  <circle cx="740" cy="80" r="2" fill="#D9D5CF"/>
  <circle cx="740" cy="240" r="2" fill="#D9D5CF"/>

  <!-- Texto lateral -->
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D9D5CF" text-anchor="middle">alineación</text>
  <text x="740" y="270" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D9D5CF" text-anchor="middle">episódica</text>

  <!-- Puntos decorativos -->
  <circle cx="140" cy="290" r="1.5" fill="#0D7D6F" opacity="0.2"/>
  <circle cx="160" cy="290" r="1.5" fill="#0D7D6F" opacity="0.3"/>
  <circle cx="180" cy="290" r="1.5" fill="#0D7D6F" opacity="0.4"/>
  <circle cx="200" cy="290" r="1.5" fill="#0D7D6F" opacity="0.5"/>
  <circle cx="600" cy="290" r="1.5" fill="#0D7D6F" opacity="0.5"/>
  <circle cx="620" cy="290" r="1.5" fill="#0D7D6F" opacity="0.4"/>
  <circle cx="640" cy="290" r="1.5" fill="#0D7D6F" opacity="0.3"/>
  <circle cx="660" cy="290" r="1.5" fill="#0D7D6F" opacity="0.2"/>
</svg>
